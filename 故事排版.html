<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事排版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 700px;
            max-width: 100%;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
            padding: 40px 36px;
        }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 28px; font-weight: 700; color: #1f2937; }
        .header p { font-size: 14px; color: #6b7280; margin-top: 6px; }

        .drop-zone {
            border: 2px dashed #d1d5db;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .drop-zone:hover { border-color: #4f6ef7; background: #f8f9ff; }
        .drop-zone.dragover { border-color: #4f6ef7; background: #eef1ff; }
        .drop-zone .icon { font-size: 40px; }
        .drop-zone .text { font-size: 14px; color: #6b7280; margin-top: 10px; }
        .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .file-info {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #f0f3ff;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 13px;
            color: #374151;
        }
        .file-info .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-info .remove-btn {
            background: none; border: none; font-size: 16px; cursor: pointer;
            color: #9ca3af; padding: 0 4px; line-height: 1;
        }
        .file-info .remove-btn:hover { color: #dc2626; }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #4f6ef7;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn:hover { background: #3b5de7; }
        .btn:disabled { background: #a5b4fc; cursor: not-allowed; }

        .output-area {
            display: none;
            margin-top: 20px;
        }
        .output-area .label {
            font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 8px;
        }
        .output-area textarea {
            width: 100%; height: 300px; padding: 14px;
            border: 1px solid #e5e7eb; border-radius: 12px;
            font-size: 13px; line-height: 1.8; resize: vertical;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fafbfc; color: #374151;
        }
        .output-area textarea:focus { outline: none; border-color: #4f6ef7; }

        .download-btn {
            margin-top: 10px; padding: 10px 20px;
            background: #10b981; color: #fff;
            border: none; border-radius: 10px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: background 0.2s ease;
        }
        .download-btn:hover { background: #059669; }

        .error-msg {
            display: none; margin-top: 12px;
            padding: 10px 14px; background: #fef2f2;
            border-radius: 8px; font-size: 13px; color: #dc2626;
        }

        @media (max-width: 600px) {
            .container { padding: 24px 16px; }
            .header h1 { font-size: 22px; }
            .drop-zone { padding: 30px 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 故事排版 - 音频合成专用</h1>
        <p>导入故事文本 → 自动拼接排版指令 → 下载排版后的 TXT 文件 → 用于 AI 排版 + 音频合成</p>
    </div>

    <div class="drop-zone" id="dropZone">
        <span class="icon">📂</span>
        <div class="text">拖入 TXT 文件，或点击选择</div>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <div class="file-info" id="fileInfo">
        <span>📄</span>
        <span class="name" id="fileName"></span>
        <span class="size" id="fileSize"></span>
        <button class="remove-btn" id="removeFileBtn">✕</button>
    </div>

    <button class="btn" id="processBtn" disabled>⚡ 生成排版文件</button>

    <div class="output-area" id="outputArea">
        <div class="label">✅ 已生成，点击下载：</div>
        <textarea id="outputText" readonly></textarea>
        <button class="download-btn" id="downloadBtn">⬇ 下载 TXT 文件</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div style="margin-top: 20px; text-align: center;">
        <a href="故事分段.html" target="_blank" style="
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 14px; background: #f0f3ff; border-radius: 8px;
            font-size: 12px; color: #4f6ef7; text-decoration: none;
        ">🖼️ 故事分段（配图专用）</a>
    </div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const removeFileBtn = document.getElementById('removeFileBtn');
const processBtn = document.getElementById('processBtn');
const outputArea = document.getElementById('outputArea');
const outputText = document.getElementById('outputText');
const downloadBtn = document.getElementById('downloadBtn');
const errorMsg = document.getElementById('errorMsg');

let currentFile = null;
let lastResult = '';

    const PROMPT = `【排版指令】
请删除以下内容的标题和章节标记等，删除正文括号内的英文单词，只保留正文，其他所有内容不变

原文：
`;

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function handleFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'txt') {
        showError('仅支持 .txt 格式');
        return;
    }
    currentFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatSize(file.size);
    fileInfo.style.display = 'flex';
    dropZone.style.display = 'none';
    processBtn.disabled = false;
    outputArea.style.display = 'none';
    errorMsg.style.display = 'none';
}

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = msg ? 'block' : 'none';
}

fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});

removeFileBtn.addEventListener('click', () => {
    currentFile = null;
    fileInput.value = '';
    fileInfo.style.display = 'none';
    dropZone.style.display = 'block';
    processBtn.disabled = true;
    outputArea.style.display = 'none';
    errorMsg.style.display = 'none';
});

processBtn.addEventListener('click', () => {
    if (!currentFile) return;
    showError(null);

    const reader = new FileReader();
    reader.onload = (e) => {
        const content = e.target.result;
        lastResult = PROMPT + content;
        outputText.value = lastResult;
        outputArea.style.display = 'block';
    };
    reader.onerror = () => {
        showError('文件读取失败');
    };
    reader.readAsText(currentFile, 'UTF-8');
});

downloadBtn.addEventListener('click', () => {
    if (!lastResult) return;
    const blob = new Blob([lastResult], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '排版prompt_' + (currentFile ? currentFile.name : 'story.txt');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
});
</script>
</body>
</html>
