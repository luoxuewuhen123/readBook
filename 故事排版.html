<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事排版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 700px;
            max-width: 100%;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
            padding: 40px 36px;
        }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 28px; font-weight: 700; color: #1f2937; }
        .header p { font-size: 14px; color: #6b7280; margin-top: 6px; }

        label { font-size: 13px; font-weight: 500; color: #374151; display: block; margin-bottom: 6px; }

        textarea {
            width: 100%; height: 200px; padding: 14px;
            border: 1px solid #e5e7eb; border-radius: 12px;
            font-size: 13px; line-height: 1.8; resize: vertical;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fafbfc; color: #374151;
        }
        textarea:focus { outline: none; border-color: #4f6ef7; }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #4f6ef7;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn:hover { background: #3b5de7; }
        .btn:disabled { background: #a5b4fc; cursor: not-allowed; }

        .output-area {
            display: none;
            margin-top: 20px;
        }
        .output-area .label {
            font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 8px;
        }

        .copy-btn {
            width: 100%;
            margin-top: 10px; padding: 12px;
            background: #10b981; color: #fff;
            border: none; border-radius: 10px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: background 0.2s ease;
        }
        .copy-btn:hover { background: #059669; }

        .error-msg {
            display: none; margin-top: 12px;
            padding: 10px 14px; background: #fef2f2;
            border-radius: 8px; font-size: 13px; color: #dc2626;
        }

        .footer-link {
            margin-top: 20px; text-align: center;
        }
        .footer-link a {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 14px; background: #f0f3ff; border-radius: 8px;
            font-size: 12px; color: #4f6ef7; text-decoration: none;
        }

        @media (max-width: 600px) {
            .container { padding: 24px 16px; }
            .header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 故事排版 - 音频合成专用</h1>
        <p>粘贴故事文本 → 自动拼接排版指令 → 复制结果发给 AI → AI 去标题去英文，生成流畅故事</p>
    </div>

    <label>粘贴原文：</label>
    <textarea id="inputText" placeholder="在此粘贴要排版的故事文本..."></textarea>

    <button class="btn" id="processBtn">⚡ 生成排版结果</button>

    <div class="output-area" id="outputArea">
        <div class="label">✅ 已生成，复制以下内容发给 AI：</div>
        <textarea id="outputText" readonly></textarea>
        <button class="copy-btn" id="copyBtn">📋 复制内容</button>
        <div id="copyTip" style="display:none; text-align:center; margin-top:8px; font-size:13px; color:#10b981; font-weight:500;">✅ 复制成功</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="footer-link">
        <a href="故事分段.html" target="_blank">🖼️ 故事分段（配图专用）</a>
    </div>
</div>

<script>
const inputText = document.getElementById('inputText');
const processBtn = document.getElementById('processBtn');
const outputArea = document.getElementById('outputArea');
const outputText = document.getElementById('outputText');
const copyBtn = document.getElementById('copyBtn');
const errorMsg = document.getElementById('errorMsg');

const PROMPT = `【排版指令】
请删除以下内容的标题和章节标记等，删除正文括号内的英文单词，只保留正文，其他所有内容不变

原文：
`;

processBtn.addEventListener('click', () => {
    const content = inputText.value.trim();
    if (!content) {
        showError('请先粘贴故事文本');
        return;
    }
    showError(null);
    const result = PROMPT + content;
    outputText.value = result;
    outputArea.style.display = 'block';
    copyBtn.textContent = '📋 复制内容';
    copyBtn.className = 'copy-btn';
});

copyBtn.addEventListener('click', async () => {
    try {
        await navigator.clipboard.writeText(outputText.value);
    } catch {
        outputText.select();
        document.execCommand('copy');
    }
    const tip = document.getElementById('copyTip');
    tip.style.display = 'block';
    setTimeout(() => { tip.style.display = 'none'; }, 1500);
});

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = msg ? 'block' : 'none';
}
</script>
</body>
</html>
